# Source: joy-operator-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels: null
  name: my-release
spec:
  replicas: 1
  selector:
    matchLabels:
      release: my-release
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        release: my-release
    spec:
      containers:
        - env:
            - name: CHART_CACHE_DIR
              value: /helm/cache
            - name: ENV_DESTINATIONS
              value: |
                {}
            - name: ENV_SOURCE_PATTERN
              value: environments/*/env.yaml
          image: ghcr.io/nestoca/joy-operator:latest
          imagePullPolicy: IfNotPresent
          name: main
          ports:
            - containerPort: 3000
              name: health
              protocol: TCP
          readinessProbe:
            failureThreshold: 6
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /helm/cache
              name: helm-cache
            - mountPath: /.config/helm
              name: helm-config
            - mountPath: /tmp
              name: tmp
      securityContext:
        fsGroup: 65532
      serviceAccountName: my-release
      volumes:
        - emptyDir: {}
          name: helm-cache
        - emptyDir: {}
          name: helm-config
        - emptyDir: {}
          name: tmp
