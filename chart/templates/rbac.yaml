{{- $values := .Values -}}
{{- $release := .Release.Name -}}
{{- $releaseNamespace := .Release.Namespace -}}

---
# Environments are cluster-scoped, so the operator needs cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $release }}-environments
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["joy.nesto.ca"]
    resources: ["environments"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["joy.nesto.ca"]
    resources: ["environments/status", "environments/finalizers"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $release }}-environments
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-environments
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
---
# Projects are cluster-scoped, so the operator needs cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $release }}-projects
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["joy.nesto.ca"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["joy.nesto.ca"]
    resources: ["projects/status", "projects/finalizers"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $release }}-projects
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-projects
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
---
# Catalogs are cluster-scoped, so the operator needs cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $release }}-catalogs
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["joy.nesto.ca"]
    resources: ["catalogs"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["joy.nesto.ca"]
    resources: ["catalogs/status", "catalogs/finalizers"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $release }}-catalogs
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-catalogs
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
---
# Releases can be reconciled cluster-wide (default) or restricted to a list of
# namespaces via $values.rbac.releases.namespaces. The ClusterRole is reused
# in either case; only the binding shape changes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $release }}-releases
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["joy.nesto.ca"]
    resources: ["releases"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["joy.nesto.ca"]
    resources: ["releases/status", "releases/finalizers"]
    verbs: ["get", "update", "patch"]
{{- if not $values.rbac.releases.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $release }}-releases
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-releases
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
{{- else }}
{{- range $ns := $values.rbac.releases.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $release }}-releases
  namespace: {{ $ns }}
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-releases
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
{{- end }}
{{- end }}
---
# Namespaces are cluster-scoped, so the operator needs cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $release }}-namespaces
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $release }}-namespaces
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $release }}-namespaces
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
---
# Argoproj Applications are managed only in the argocd namespace. We use a
# ClusterRole bound via a RoleBinding scoped to that single namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $release }}-applications
  namespace: argocd
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $release }}-applications
  namespace: argocd
  labels:
    {{- if $values.commonLabels }}
    {{- toYaml $values.commonLabels | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $release }}-applications
subjects:
  - kind: ServiceAccount
    name: {{ $release }}
    namespace: {{ $releaseNamespace }}
