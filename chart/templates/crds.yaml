                      type: string
                    repoUrl:
                      type: string
                    version:
                      type: string
                  type: object
                links:
                  additionalProperties:
                    type: string
                  type: object
                namespace:
                  type: string
                project:
                  type: string
                values:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                version:
                  type: string
              type: object
          required:
            - metadata
            - spec
          type: object
      served: true
      storage: true
