image: oci://ghcr.io/joy-operator
version: latest

helm:
  registry: ""
  credentials:
    secret: ""
    key: ""
    mountPath: ""

commonLabels: {}

# RBAC settings. The operator needs:
#   - cluster-wide access to environments.joy.nesto.ca (cluster-scoped CRD)
#   - access to applications.argoproj.io in the argocd namespace
#   - access to releases.joy.nesto.ca across configured namespaces
rbac:
  releases:
    # Namespaces in which the operator may manage releases.joy.nesto.ca.
    # Empty list = cluster-wide (ClusterRoleBinding). Otherwise one RoleBinding
    # is created per namespace listed.
    namespaces: []

resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

controller: {}
  # concurrency: 8
  # pullMode: true
  # defaultCatalog: catalog

environmentDestinations: {}

# Glob pattern to match source environment files
# Uses glob syntax from https://github.com/gobwas/glob
# To specify multiple specific environments, use something like `environments/{dev,demo}/env.yaml`
environmentSourcePattern: "environments/*/env.yaml"
