image: ghcr.io/nestoca/joy-operator
version: latest

helm:
  registry: ''
  credentials:
    secret: ''
    key: ''
    mountPath: ''

commonLabels: {}

resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Arbitrary volumes appended to the deployment pod spec, with their
# corresponding mounts on the main container. Primarily intended for testing,
# e.g. mounting a local chart directory into the operator.
extraVolumes: []
  # - name: local-chart
  #   hostPath:
  #     path: /path/to/local/chart
  #     type: Directory
extraVolumeMounts: []
  # - name: local-chart
  #   mountPath: /charts/local-chart
  #   readOnly: true

controller: {}
  # concurrency: 8
  # pullMode: true
  # defaultCatalog: catalog

environmentDestinations: {}

# Glob pattern to match source environment files
# Uses glob syntax from https://github.com/gobwas/glob
# To specify multiple specific environments, use something like `environments/{dev,demo}/env.yaml`
environmentSourcePattern: 'environments/*/env.yaml'

installCRDs: true
